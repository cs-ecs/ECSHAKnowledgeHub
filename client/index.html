<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Ecsha Knowledge Hub</title>

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header>

<div class="logo">

<h1>ECSHA Knowledge Hub</h1>

</div>

<div class="top-actions">

<input
type="text"
id="searchBox"
placeholder="Search articles...">

</div>

</header>


<div class="toolbar">

<nav id="categoryMenu">

</nav>

<div class="viewActions">

<button id="expandBtn">

<i class="fa-solid fa-expand"></i>

</button>

</div>

</div>



<div class="main-container">


<div class="left-panel">

<div id="articlesContainer">

</div>

</div>



<div class="right-panel"
id="rightPanel">

<div id="articleDetail">

<div class="empty">

<h2>Select Article</h2>

<p>Click article card to read</p>

</div>

</div>

</div>


</div>


<script src="app.js"></script>

</body>
</html>
